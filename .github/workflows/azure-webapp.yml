name: Build and Deploy Web App

on:
  push:
    branches:
      - main
      - dev
      - sbx
  pull_request:
    branches:
      - main
      - dev
      - sbx
  workflow_dispatch:
    inputs:
      deploy:
        description: Run Azure App Service deployment after build
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  PACKAGE_ROOT: package
  PACKAGE_PATH: app.zip
  WEBAPP_NAME_PRIMARY: web-platform-eus-dev-python
  WEBAPP_NAME_SECONDARY: ""
  WEBAPP_NAME_THIRD: ""
  STARTUP_COMMAND: gunicorn --bind=0.0.0.0 --timeout 600 --access-logfile '-' --error-logfile '-' app:app

jobs:
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.context.outputs.branch_name }}
      deploy_env: ${{ steps.context.outputs.deploy_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          case "${branch_name}" in
            main)
              deploy_env="prod"
              ;;
            dev)
              deploy_env="dev"
              ;;
            sbx)
              deploy_env="sbx"
              ;;
            *)
              deploy_env="dev"
              ;;
          esac

          echo "branch_name=${branch_name}" >> "${GITHUB_OUTPUT}"
          echo "deploy_env=${deploy_env}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve Python interpreter
        shell: bash
        run: |
          set -euo pipefail
          echo "Using Python interpreter: $(command -v python)"
          python --version

      - name: Stage application files
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "${PACKAGE_ROOT}"
          mkdir -p "${PACKAGE_ROOT}"

          cp app.py "${PACKAGE_ROOT}/"
          cp requirements.txt "${PACKAGE_ROOT}/"
          cp -R templates "${PACKAGE_ROOT}/templates"
          cp -R static "${PACKAGE_ROOT}/static"

          find "${PACKAGE_ROOT}" -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Archive application
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          source_dir = Path("package")
          archive_path = Path("app.zip")

          if archive_path.exists():
              archive_path.unlink()

          with ZipFile(archive_path, "w", compression=ZIP_DEFLATED) as zf:
              for path in sorted(source_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(source_dir))
          PY

      - name: Upload package artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-${{ github.run_id }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

  deployment-precheck:
    name: Deployment Precheck
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Validate deployment configuration
        id: check
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          WEBAPP_NAME_PRIMARY_VAR: ${{ vars.WEBAPP_NAME_PRIMARY }}
          WEBAPP_NAME_SECONDARY_VAR: ${{ vars.WEBAPP_NAME_SECONDARY }}
          WEBAPP_NAME_THIRD_VAR: ${{ vars.WEBAPP_NAME_THIRD }}
        run: |
          set -euo pipefail

          primary_target="${WEBAPP_NAME_PRIMARY_VAR:-${WEBAPP_NAME_PRIMARY}}"
          secondary_target="${WEBAPP_NAME_SECONDARY_VAR:-${WEBAPP_NAME_SECONDARY}}"
          third_target="${WEBAPP_NAME_THIRD_VAR:-${WEBAPP_NAME_THIRD}}"

          if [[ -z "${AZURE_CREDENTIALS}" ]]; then
            echo "::warning::Missing required deploy secret: AZURE_CREDENTIALS. Deploy stage will be skipped."
            echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${primary_target}" && -z "${secondary_target}" && -z "${third_target}" ]]; then
            echo "::warning::Missing deploy target configuration: set at least one of WEBAPP_NAME_PRIMARY, WEBAPP_NAME_SECONDARY, or WEBAPP_NAME_THIRD. Deploy stage will be skipped."
            echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os

          raw = os.environ["AZURE_CREDENTIALS"]
          try:
              creds = json.loads(raw)
          except json.JSONDecodeError:
              print("::warning::AZURE_CREDENTIALS is not valid JSON. Deploy stage will be skipped.")
              print("should_deploy=false")
              raise SystemExit(0)

          required_fields = ("clientId", "clientSecret", "subscriptionId", "tenantId")
          missing = [field for field in required_fields if not str(creds.get(field, "")).strip()]
          if missing:
              print(
                  "::warning::AZURE_CREDENTIALS is missing required azure/login fields: "
                  + ", ".join(missing)
                  + ". Deploy stage will be skipped."
              )
              print("should_deploy=false")
          else:
              print("should_deploy=true")
          PY

  deploy:
    name: Deploy
    needs:
      - deployment-precheck
      - build-package
    if: >
      github.event_name != 'pull_request' &&
      needs.deployment-precheck.outputs.should_deploy == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy)
    runs-on: ubuntu-latest
    environment: ${{ needs.build-package.outputs.deploy_env }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package-${{ github.run_id }}
          path: .

      - name: Python deploy precheck
        shell: bash
        env:
          STARTUP_COMMAND_VAR: ${{ vars.STARTUP_COMMAND }}
        run: |
          set -euo pipefail

          package_path="${GITHUB_WORKSPACE}/${PACKAGE_PATH}"
          startup_command="${STARTUP_COMMAND_VAR:-${STARTUP_COMMAND}}"

          if [[ ! -f "${package_path}" ]]; then
            echo "Deployment package not found at ${package_path}" >&2
            exit 1
          fi

          if [[ ! "${PYTHON_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "PYTHON_VERSION must be in <major>.<minor> format. Current value: ${PYTHON_VERSION}" >&2
            exit 1
          fi

          if [[ -z "${startup_command}" ]]; then
            echo "Startup command is empty." >&2
            exit 1
          fi

          if [[ "${startup_command}" != *"app:app"* ]]; then
            echo "Startup command does not reference the expected WSGI target 'app:app': ${startup_command}" >&2
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          package_path = Path("app.zip")
          required_files = {
              "app.py",
              "requirements.txt",
              "templates/base.html",
          }
          required_prefixes = (
              "static/",
              "templates/",
          )

          with ZipFile(package_path) as zf:
              names = set(zf.namelist())

          missing_files = sorted(path for path in required_files if path not in names)
          missing_prefixes = [
              prefix for prefix in required_prefixes
              if not any(name.startswith(prefix) for name in names)
          ]

          if missing_files or missing_prefixes:
              details = []
              if missing_files:
                  details.append(f"missing files: {', '.join(missing_files)}")
              if missing_prefixes:
                  details.append(f"missing paths: {', '.join(missing_prefixes)}")
              raise SystemExit("Package precheck failed: " + "; ".join(details))

          print(f"Package precheck passed for {package_path} with {len(names)} archived entries.")
          PY

      - name: Deploy authentication precheck
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          WEBAPP_NAME_PRIMARY_VAR: ${{ vars.WEBAPP_NAME_PRIMARY }}
          WEBAPP_NAME_SECONDARY_VAR: ${{ vars.WEBAPP_NAME_SECONDARY }}
          WEBAPP_NAME_THIRD_VAR: ${{ vars.WEBAPP_NAME_THIRD }}
        run: |
          set -euo pipefail

          primary_target="${WEBAPP_NAME_PRIMARY_VAR:-${WEBAPP_NAME_PRIMARY}}"
          secondary_target="${WEBAPP_NAME_SECONDARY_VAR:-${WEBAPP_NAME_SECONDARY}}"
          third_target="${WEBAPP_NAME_THIRD_VAR:-${WEBAPP_NAME_THIRD}}"

          if [[ -z "${AZURE_CREDENTIALS}" ]]; then
            echo "Missing required secret: AZURE_CREDENTIALS" >&2
            exit 1
          fi

          if [[ -z "${primary_target}" && -z "${secondary_target}" && -z "${third_target}" ]]; then
            echo "No deployment targets are configured. Set WEBAPP_NAME_PRIMARY/SECONDARY/THIRD in repo or environment variables." >&2
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import sys

          raw = os.environ["AZURE_CREDENTIALS"]
          try:
              creds = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"AZURE_CREDENTIALS is not valid JSON: {exc}") from exc

          required_fields = ("clientId", "clientSecret", "subscriptionId", "tenantId")
          missing = [field for field in required_fields if not str(creds.get(field, "")).strip()]
          if missing:
              raise SystemExit(
                  "AZURE_CREDENTIALS is missing required fields for azure/login: "
                  + ", ".join(missing)
              )

          print(
              "Azure authentication precheck passed for azure/login with fields: "
              + ", ".join(required_fields)
          )
          PY

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy web apps with ZIP deploy and build automation
        shell: bash
        env:
          WEBAPP_NAME_PRIMARY_VAR: ${{ vars.WEBAPP_NAME_PRIMARY }}
          WEBAPP_NAME_SECONDARY_VAR: ${{ vars.WEBAPP_NAME_SECONDARY }}
          WEBAPP_NAME_THIRD_VAR: ${{ vars.WEBAPP_NAME_THIRD }}
          STARTUP_COMMAND_VAR: ${{ vars.STARTUP_COMMAND }}
        run: |
          set -euo pipefail

          package_path="${GITHUB_WORKSPACE}/${PACKAGE_PATH}"
          primary_target="${WEBAPP_NAME_PRIMARY_VAR:-${WEBAPP_NAME_PRIMARY}}"
          secondary_target="${WEBAPP_NAME_SECONDARY_VAR:-${WEBAPP_NAME_SECONDARY}}"
          third_target="${WEBAPP_NAME_THIRD_VAR:-${WEBAPP_NAME_THIRD}}"
          startup_command="${STARTUP_COMMAND_VAR:-${STARTUP_COMMAND}}"

          test_scm_connectivity() {
            local host_name="$1"

            echo "Starting SCM connectivity preflight for ${host_name}..."
            echo "SCM DNS lookup results:"

            if getent ahosts "${host_name}" > /tmp/scm_dns.txt 2>/tmp/scm_dns_err.txt; then
              awk '!seen[$1 FS $2]++ { printf("SCM resolved address [%s]: %s\n", $2, $1) }' /tmp/scm_dns.txt
            else
              cat /tmp/scm_dns_err.txt || true
              if command -v nslookup >/dev/null 2>&1; then
                nslookup "${host_name}" || true
              fi
              echo "Failed to resolve ${host_name} from the GitHub runner." >&2
              echo "If the App Service uses a private endpoint, use a self-hosted runner with private DNS and TCP 443 access to the SCM endpoint." >&2
              exit 1
            fi

            if command -v host >/dev/null 2>&1; then
              echo "SCM canonical host details:"
              host "${host_name}" || true
            fi

            echo "SCM TCP probe: testing ${host_name}:443"
            if timeout 10 bash -c "cat < /dev/null > /dev/tcp/${host_name}/443" 2>/tmp/scm_tcp_err.txt; then
              echo "SCM TCP probe succeeded for ${host_name}:443."
            else
              cat /tmp/scm_tcp_err.txt || true
              echo "Failed to reach https://${host_name} from the GitHub runner." >&2
              echo "Private endpoint deployments require network access to the SCM/Kudu endpoint." >&2
              exit 1
            fi

            local http_status
            if ! http_status="$(curl -I -sS -o /tmp/scm_headers.txt -w "%{http_code}" --connect-timeout 20 --max-time 30 "https://${host_name}/api/settings")"; then
              cat /tmp/scm_headers.txt 2>/dev/null || true
              echo "Failed to reach https://${host_name} from the GitHub runner." >&2
              exit 1
            fi

            local status_line
            status_line="$(head -n 1 /tmp/scm_headers.txt | tr -d '\r')"
            echo "SCM HTTP probe returned status=${http_status} firstLine='${status_line}' from ${host_name}."
          }

          deploy_target() {
            local app_name="$1"

            if [[ -z "${app_name}" ]]; then
              echo "Deployment target is blank. Skipping."
              return 0
            fi

            local app_id
            app_id="$(az resource list --name "${app_name}" --resource-type "Microsoft.Web/sites" --query "[0].id" --output tsv)"

            if [[ -z "${app_id}" ]]; then
              echo "App Service '${app_name}' was not found. Skipping deployment."
              return 0
            fi

            local subscription_id resource_group scm_host
            subscription_id="$(cut -d'/' -f3 <<<"${app_id}")"
            resource_group="$(cut -d'/' -f5 <<<"${app_id}")"
            scm_host="${app_name}.scm.azurewebsites.net"

            echo "Deploying ZIP package with build automation to ${app_name}..."
            az account set --subscription "${subscription_id}"
            test_scm_connectivity "${scm_host}"

            az webapp config set \
              --resource-group "${resource_group}" \
              --name "${app_name}" \
              --linux-fx-version "PYTHON|${PYTHON_VERSION}" \
              --startup-file "${startup_command}"

            az webapp config appsettings delete \
              --resource-group "${resource_group}" \
              --name "${app_name}" \
              --setting-names WEBSITE_RUN_FROM_PACKAGE PYTHONPATH || true

            az webapp config appsettings set \
              --resource-group "${resource_group}" \
              --name "${app_name}" \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                ENABLE_ORYX_BUILD=true \
                APP_SERVICE_NAME="${app_name}" \
                APP_SERVICE_SUBSCRIPTION_ID="${subscription_id}" \
                APP_SERVICE_RESOURCE_GROUP="${resource_group}"

            az webapp deploy \
              --resource-group "${resource_group}" \
              --name "${app_name}" \
              --src-path "${package_path}" \
              --type zip \
              --restart true
          }

          deploy_target "${primary_target}"
          deploy_target "${secondary_target}"
          deploy_target "${third_target}"


  create-git-tag:
    name: Create Git Tag
    if: github.event_name != 'pull_request' && needs.build-package.result == 'success'
    needs:
      - build-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create annotated semantic version tag
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          latest_tag="$(git tag --list 'v[1-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v1.0.0"
            previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [[ -n "${previous_tag}" ]]; then
              commit_range="${previous_tag}..${SOURCE_SHA}"
            else
              commit_range="${SOURCE_SHA}"
            fi
          else
            commit_range="${latest_tag}..${SOURCE_SHA}"
          fi

          commits="$(git log --format=%B ${commit_range})"
          release_notes="$(git log --format='- %s (%h)' ${commit_range} | head -n 20)"
          if [[ -z "${release_notes}" ]]; then
            release_notes="- ${SOURCE_SHA}"
          fi

          if grep -Eq '(^|[[:space:]])BREAKING[ -]CHANGE:|^[a-zA-Z][a-zA-Z0-9-]*(\([^)]+\))?!:' <<< "${commits}"; then
            bump="major"
          elif grep -Eq '^feat(\([^)]+\))?:' <<< "${commits}"; then
            bump="minor"
          elif grep -Eq '^fix(\([^)]+\))?:' <<< "${commits}"; then
            bump="patch"
          else
            echo "No semantic-release prefix found; defaulting to patch bump."
            bump="patch"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          tag_name="v${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            echo "Tag ${tag_name} already exists; leaving it unchanged."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Remote already has tag ${tag_name}; leaving it unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag_message="$(mktemp)"
          {
            echo "Release ${tag_name} (${bump})"
            echo
            echo "Source: ${SOURCE_BRANCH}@${SOURCE_SHA}"
            echo "Range: ${commit_range}"
            echo
            echo "Changes:"
            printf '%s\n' "${release_notes}"
          } > "${tag_message}"

          git tag -a "${tag_name}" "${SOURCE_SHA}" -F "${tag_message}"
          git push origin "refs/tags/${tag_name}"

  pre-publish-check:
    name: Pre-Publish Check
    runs-on: ubuntu-latest
    outputs:
      should_publish_stage_repo: ${{ steps.check.outputs.should_publish_stage_repo }}
      should_publish_ado_repo: ${{ steps.check.outputs.should_publish_ado_repo }}
    steps:
      - name: Validate publish mirror configuration
        id: check
        shell: bash
        env:
          STAGE_REPO_URL: ${{ vars.STAGE_REPO_URL }}
          STAGE_REPO_TOKEN: ${{ secrets.STAGE_REPO_TOKEN }}
          ADO_REPO_URL: ${{ vars.ADO_REPO_URL }}
          ADO_REPO_PAT: ${{ secrets.ADO_REPO_PAT }}
        run: |
          set -euo pipefail

          if [[ -z "${STAGE_REPO_URL}" || -z "${STAGE_REPO_TOKEN}" ]]; then
            echo "::warning::Missing stage mirror configuration: STAGE_REPO_URL and/or STAGE_REPO_TOKEN. Stage repo publish will be skipped."
            echo "should_publish_stage_repo=false" >> "${GITHUB_OUTPUT}"
          else
            echo "should_publish_stage_repo=true" >> "${GITHUB_OUTPUT}"
          fi

          if [[ -z "${ADO_REPO_URL}" || -z "${ADO_REPO_PAT}" ]]; then
            echo "::warning::Missing Azure DevOps mirror configuration: ADO_REPO_URL and/or ADO_REPO_PAT. Azure DevOps publish will be skipped."
            echo "should_publish_ado_repo=false" >> "${GITHUB_OUTPUT}"
          else
            echo "should_publish_ado_repo=true" >> "${GITHUB_OUTPUT}"
          fi

  publish-stage-repo:
    name: Publish Github Repo
    needs:
      - build-package
      - pre-publish-check
    if: github.event_name != 'pull_request' && needs.build-package.result == 'success' && needs.pre-publish-check.outputs.should_publish_stage_repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Publish clean snapshot to stage repo
        env:
          STAGE_REPO_URL: ${{ vars.STAGE_REPO_URL }}
          STAGE_REPO_TOKEN: ${{ secrets.STAGE_REPO_TOKEN }}
          SOURCE_BRANCH: ${{ needs.build-package.outputs.branch_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          rsync -a \
            --exclude='.git' \
            "${GITHUB_WORKSPACE}/" "${workdir}/repo/"

          cd "${workdir}/repo"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${SOURCE_BRANCH}"
          git add .
          git commit -m "Stage snapshot from ${SOURCE_BRANCH}@${SOURCE_SHA}"

          target_repo="${STAGE_REPO_URL#https://}"
          git remote add origin "https://x-access-token:${STAGE_REPO_TOKEN}@${target_repo}.git"
          git push --force origin "${SOURCE_BRANCH}"

  publish-ado-repo:
    name: Publish ADO Repo
    needs:
      - build-package
      - pre-publish-check
    if: github.event_name != 'pull_request' && needs.build-package.result == 'success' && needs.pre-publish-check.outputs.should_publish_ado_repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Publish clean snapshot to Azure DevOps repo
        env:
          ADO_REPO_URL: ${{ vars.ADO_REPO_URL }}
          ADO_REPO_PAT: ${{ secrets.ADO_REPO_PAT }}
          SOURCE_BRANCH: ${{ needs.build-package.outputs.branch_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          rsync -a \
            --exclude='.git' \
            "${GITHUB_WORKSPACE}/" "${workdir}/repo/"

          cd "${workdir}/repo"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${SOURCE_BRANCH}"
          git add .
          git commit -m "ADO snapshot from ${SOURCE_BRANCH}@${SOURCE_SHA}"

          target_repo="${ADO_REPO_URL#https://}"
          git remote add origin "https://ado:${ADO_REPO_PAT}@${target_repo}"
          git push --force origin "${SOURCE_BRANCH}"
